description = "Initialize a new Slidev project"
prompt = """
Please initialize a new Slidev project in the current directory.

1. **Environment Check**:
   - Verify if `node` and `npm` (or `pnpm`/`yarn`) are installed and available in the PATH.
   - If not found, inform the user about the missing prerequisites.

2. **Directory Check**:
   - Check if the current directory is empty or already contains a Slidev project (check for `slides.md` or `package.json`).
   - If `package.json` exists, ask for confirmation before proceeding with initialization.

3. **Execution**:
   - Run 'npm init slidev@latest' using the shell command.
   - Suggest the user to choose a theme (e.g., 'seriph', 'default', 'apple-basic').
   - Explain the created file structure (slides.md, components/, public/, etc.).
"""

